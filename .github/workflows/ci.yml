name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tools dependencies
        working-directory: tools
        run: npm ci

      - name: Typecheck tools
        working-directory: tools
        run: npm run typecheck

      - name: Regenerate Lean from TypeScript
        run: ./regen-lean.sh

      - name: Check Lean generated files are up to date
        run: |
          git diff --exit-code
          untracked=$(git ls-files --others --exclude-standard -- '*.def.lean' '*.types.lean')
          if [ -n "$untracked" ]; then
            echo "ERROR: Untracked generated Lean files:"
            echo "$untracked"
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Dafny
        uses: dafny-lang/setup-dafny-action@v1
        with:
          dafny-version: '4.11.0'

      - name: Regenerate Dafny and verify
        run: ./regen-dafny.sh

      - name: Check Dafny additions-only and verify
        run: |
          for f in examples/*.ts; do
            echo "=== checking $f ==="
            npx tsx tools/src/lsc.ts check --backend=dafny "$f"
          done

      - name: Check Dafny generated files are up to date
        run: |
          git diff --exit-code -- '*.dfy.gen' '*.dfy'
          untracked=$(git ls-files --others --exclude-standard -- '*.dfy.gen')
          if [ -n "$untracked" ]; then
            echo "ERROR: Untracked .dfy.gen files:"
            echo "$untracked"
            exit 1
          fi

  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Loom fork
        run: git clone https://github.com/namin/loom.git -b lemma ../loom

      - name: Clone Velvet fork
        run: git clone https://github.com/namin/velvet.git -b lemma ../velvet

      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: false

      - name: Build
        run: lake build
