name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install tools dependencies
        working-directory: tools
        run: npm ci

      - name: Typecheck tools
        working-directory: tools
        run: npm run typecheck

      - name: Typecheck examples
        run: npm run typecheck:examples

      - name: Regenerate Lean from TypeScript
        run: ./regen-lean.sh

      - name: Check Lean generated files are up to date
        run: |
          git diff --exit-code
          untracked=$(git ls-files --others --exclude-standard -- '*.def.lean' '*.types.lean')
          if [ -n "$untracked" ]; then
            echo "ERROR: Untracked generated Lean files:"
            echo "$untracked"
            exit 1
          fi

      - uses: ./.github/actions/setup-dafny

      # Drift + additions-only only; `dafny verify` runs in the sharded
      # `examples-dafny` job below (parallel), off this job's critical path.
      - name: Regenerate Dafny (drift + additions-only; verify runs in examples-dafny)
        run: ./regen-dafny.sh --no-verify

      - name: Check Dafny generated files are up to date
        run: |
          git diff --exit-code -- '*.dfy.gen' '*.dfy'
          untracked=$(git ls-files --others --exclude-standard -- '*.dfy.gen')
          if [ -n "$untracked" ]; then
            echo "ERROR: Untracked .dfy.gen files:"
            echo "$untracked"
            exit 1
          fi

  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-lean
        with:
          use-github-cache: 'true'

      - name: Build
        run: lake build

  # Dafny verification of the examples, sharded across runners. The `tools` job
  # enforces drift + additions-only (regen --no-verify); this job runs the actual
  # `dafny verify` in parallel. Files are split by index (i % N == shard), so no
  # hand-maintained file list. Each shard also re-checks drift for its own slice.
  examples-dafny:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install tools dependencies
        working-directory: tools
        run: npm ci

      - uses: ./.github/actions/setup-dafny

      - name: Check Dafny (shard ${{ matrix.shard }} of 4)
        run: |
          i=0
          for f in examples/*.ts; do
            if [ $((i % 4)) -eq ${{ matrix.shard }} ]; then
              echo "=== checking $f ==="
              npx tsx tools/src/lsc.ts check --backend=dafny "$f"
            fi
            i=$((i + 1))
          done

      - name: Check Dafny generated files are up to date (this shard)
        run: |
          git diff --exit-code -- '*.dfy.gen' '*.dfy'
          untracked=$(git ls-files --others --exclude-standard -- '*.dfy.gen')
          if [ -n "$untracked" ]; then
            echo "ERROR: Untracked .dfy.gen files:"
            echo "$untracked"
            exit 1
          fi

  case-studies-dafny:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: midspiral/collab-todo-lemmascript
            branch: main
          - repo: midspiral/colorwheel-lemmascript
            branch: main
          - repo: midspiral/node-casbin-lemmascript
            branch: lemmascript
          - repo: midspiral/clear-split-lemmascript
            branch: main
          - repo: midspiral/hono-lemmascript
            branch: lemmascript
          - repo: midspiral/hono-rate-limiter-with-lemmascript
            branch: main
          - repo: CHARM-BDF/charmchat
            branch: lemma
          - repo: midspiral/xyflow-lemmascript
            branch: lemmascript
          - repo: midspiral/equality-game-lemmascript
            branch: main
          - repo: midspiral/github-star-checker-lemmascript
            branch: main
          - repo: midspiral/rallly-lemmascript
            branch: lemmascript
          - repo: midspiral/talktimer-lemmascript
            branch: main
          - repo: midspiral/opencode-lemmascript
            branch: lemmascript
          - repo: midspiral/anthropic-sdk-lemmascript
            branch: lemmascript
          - repo: midspiral/trace-solo-lemmascript
            branch: main
          - repo: midspiral/pi-lemmascript
            branch: lemmascript
          - repo: midspiral/balanced-match-lemmascript
            branch: lemmascript
          - repo: midspiral/guardians-lemmascript
            branch: main
          - repo: midspiral/guardians-lemmascript
            branch: generate-verify-execute
          - repo: midspiral/quorum-lemmascript
            branch: main
          - repo: midspiral/quorum-tutorial-lemmascript
            branch: main
          - repo: midspiral/quota-lemmascript
            branch: main
          - repo: midspiral/henri-lemmascript
            branch: main
          - repo: midspiral/henri-lemmascript
            branch: generate-verify-execute
          - repo: midspiral/henri-lemmascript
            branch: session
          - repo: midspiral/eventab-lemmascript
            branch: main
          - repo: midspiral/eslint-plugin-with-lemmascript
            branch: main
          - repo: midspiral/infisical-lemmascript
            branch: lemmascript
    steps:
      - uses: actions/checkout@v6

      - name: Clone case study
        run: git clone --branch ${{ matrix.branch }} https://github.com/${{ matrix.repo }}.git ../case-study

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: cd tools && npm ci

      - uses: ./.github/actions/setup-dafny

      - name: Regenerate and verify Dafny
        working-directory: ../case-study
        run: ../LemmaScript/tools/check.sh dafny

      - name: Verify extra Dafny files
        working-directory: ../case-study
        run: test -f ./check-extra.sh && ./check-extra.sh || true

      - name: Check generated Dafny files are up to date
        working-directory: ../case-study
        run: |
          git diff --exit-code -- '*.dfy.gen' '*.dfy'
          untracked=$(git ls-files --others --exclude-standard -- '*.dfy.gen')
          if [ -n "$untracked" ]; then
            echo "ERROR: Untracked generated Dafny files:"
            echo "$untracked"
            exit 1
          fi

  case-studies-lean:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: midspiral/colorwheel-lemmascript
            branch: main
          - repo: midspiral/node-casbin-lemmascript
            branch: lemmascript
          - repo: midspiral/clear-split-lemmascript
            branch: main
          - repo: midspiral/pi-lemmascript
            branch: lemmascript
    steps:
      - uses: actions/checkout@v6

      - name: Clone case study
        run: git clone --branch ${{ matrix.branch }} https://github.com/${{ matrix.repo }}.git ../case-study

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: cd tools && npm ci

      - uses: ./.github/actions/setup-lean
        with:
          lake-package-directory: ../case-study
          use-github-cache: 'true'

      - name: Regenerate and build Lean
        working-directory: ../case-study
        run: ../LemmaScript/tools/check.sh lean

      - name: Check generated Lean files are up to date
        working-directory: ../case-study
        run: |
          git diff --exit-code -- '*.def.lean' '*.types.lean'
          untracked=$(git ls-files --others --exclude-standard -- '*.def.lean' '*.types.lean')
          if [ -n "$untracked" ]; then
            echo "ERROR: Untracked generated Lean files:"
            echo "$untracked"
            exit 1
          fi
